name: quran_teacher_tracker
description: متعقّب معلم القرآن - متابعة الطلاب في الحفظ والمراجعة والحضور والملاحظات.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.6
  flutter_riverpod: ^2.5.1
  go_router: ^13.2.0
  intl: ^0.19.0
  fl_chart: ^0.66.2
  qr_flutter: ^4.1.0
  share_plus: ^7.2.2
  uuid: ^4.3.3
  google_fonts: ^6.2.1
  shared_preferences: ^2.2.2
  crypto: ^3.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
